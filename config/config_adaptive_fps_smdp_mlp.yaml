# config.yaml of the Adaptive-FPS SMDP (feedforward) Experiment
# One wrapper step() = one full decision window (variable physics-tick length,
# 1-50 ticks depending on the chosen FPS), trained with gamma**duration GAE.
# See smdp/README_smpd.md and smdp/experiments/adaptive_fps_smdp/train_mlp.py.
seed: 1
total_timesteps: 15_000_000
learning_rate: 0.0001
num_envs: 8
num_steps: 512
gamma: 0.99
gae_lambda: 0.98
num_minibatches: 4
update_epochs: 4
ent_coef: 0.01
vf_coef: 0.5
clip_coef: 0.2
max_grad_norm: 0.5
anneal_lr: false
norm_adv: true
clip_vloss: true
nav_model_path: "experiments/navigation/runs/CarRacing-v3__ppo__1__1781901069/final.pt"

# Sampling cost: charged once per decision window. Higher chosen FPS -> shorter
# windows -> more decisions over a fixed episode length -> already penalized more
# by this flat per-window charge, no extra scaling needed. Values below match the
# closest existing SMDP-style reference (smdp/experiments/adaptive_fps_step_loop).
frame_cost: 0.4
budget: 100.0
# Physics-tick cap enforced inside the wrapper itself (world_step_count), not an
# outer TimeLimit -- a single window can already span up to 50 physics ticks, so
# an outer per-window TimeLimit would be counting the wrong unit.
max_physics_steps: 1000
#resume_path: None
