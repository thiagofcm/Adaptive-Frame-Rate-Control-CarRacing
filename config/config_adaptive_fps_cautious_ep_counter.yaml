# config.yaml of the Adaptive-FPS Cautious (episode-counter) Experiment
seed: 1
total_timesteps: 15_000_000
learning_rate: 0.0001
num_envs: 8
num_steps: 512
gamma: 0.99
gae_lambda: 0.95
num_minibatches: 32
update_epochs: 10
ent_coef: 0.03
vf_coef: 0.5
clip_coef: 0.2
max_grad_norm: 0.5
anneal_lr: True
norm_adv: true
clip_vloss: true
nav_model_path: "experiments/navigation/runs/CarRacing-v3__ppo__1__1781901069/final.pt"

# Adaptive-FPS reward shaping
# nav_reward per wrapper-step is ~-0.4 baseline (4 skipped raw frames x -0.1)
# plus +1000/N tile-progress spikes -- keep frame_cost a small fraction of that
# baseline so it nudges sampling frequency instead of dominating the signal.
frame_cost: 0.02
# CarRacing-v3's own 1000-raw-frame cap plus no_operation=50/skip_frames=4 in
# CarRacingPreprocessing means an episode can reach at most ~238 wrapper-steps
# (confirmed empirically), i.e. at most ~238 real samples if fps_choice=50 the whole
# time. budget must sit below that ceiling or the penalty can never fire -- 150
# still leaves room for "sample less than every step" strategies to finish clean.
budget: 150
max_episode_steps: 250
#resume_path: None
