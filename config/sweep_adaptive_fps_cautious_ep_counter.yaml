# sweep config for the Adaptive-FPS Cautious (ep_counter) frame_cost study.
# Same schema/values as config_adaptive_fps_cautious_ep_counter.yaml for every key
# except `sweep:`, which sweep.py takes the Cartesian product of to build one
# materialized run config per combination.
seed: 1
total_timesteps: 15_000_000
learning_rate: 0.0001
num_envs: 8
num_steps: 512
gamma: 0.99
gae_lambda: 0.95
num_minibatches: 4
update_epochs: 10
ent_coef: 0.03
vf_coef: 0.5
clip_coef: 0.2
max_grad_norm: 0.5
anneal_lr: True
norm_adv: true
clip_vloss: true
nav_model_path: "experiments/navigation/runs/CarRacing-v3__ppo__1__1781901069/final.pt"

# CarRacing-v3's own 1000-raw-frame cap plus no_operation=50/skip_frames=4 in
# CarRacingPreprocessing means an episode can reach at most ~238 wrapper-steps
# (confirmed empirically), i.e. at most ~238 real samples if fps_choice=50 the whole
# time. budget must sit below that ceiling or the penalty can never fire -- 150
# still leaves room for "sample less than every step" strategies to finish clean.
budget: 150
max_episode_steps: 2000

# Sweep combinations -- sweep.py builds the Cartesian product across these lists.
# frame_cost=0.0 isolates the budget constraint's effect on its own (no extra
# per-sample penalty); increasing it should push the policy toward lower average
# chosen FPS (charts/mean_chosen_fps) at the cost of episodic_return.
sweep:
  frame_cost: [0.0, 0.05, 0.1, 0.2, 0.4, 0.5, 1.0, 2.0]
